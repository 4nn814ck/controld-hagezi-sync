# =============================================================================
# ControlD Hagezi Sync — Configuration
# =============================================================================
# Copy this file to config.toml and customize it.
# DO NOT commit config.toml if it contains your API token.
# =============================================================================

[settings]
# Your ControlD API Write Token.
# Get it from: https://controld.com/dashboard/api
# You can also leave this empty and use the CONTROLD_API_TOKEN env var.
api_token = ""

# Uncomment to skip the upstream freshness report at the end of each sync run.
# This avoids unauthenticated GitHub API calls (60 req/hr limit) — useful for CI.
# show_freshness = false

# Set to true to preview changes without modifying anything.
dry_run = false

[profiles]
# Exact names of your ControlD profiles (case-sensitive).
names = ["Aggressive", "Extreme", "Extreme for Windows", "Hardened"]

# =============================================================================
# FOLDER DEFINITIONS
# =============================================================================
# Each line under [folders] maps a friendly name → Hagezi JSON URL.
# The friendly name is what appears in your ControlD dashboard.
# =============================================================================

[folders]
"Apple Tracker"         = "https://github.com/hagezi/dns-blocklists/blob/main/controld/native-tracker-apple-folder.json"
"Badware Hoster"         = "https://raw.githubusercontent.com/hagezi/dns-blocklists/main/controld/badware-hoster-folder.json"
"Known Issues allow"         = "https://github.com/hagezi/dns-blocklists/blob/main/controld/ultimate-known_issues-allow-folder.json"
"LG webOS Tracker"         = "https://github.com/hagezi/dns-blocklists/blob/main/controld/native-tracker-lgwebos-folder.json"
"Microsoft Tracker"         = "https://github.com/hagezi/dns-blocklists/blob/main/controld/native-tracker-microsoft-folder.json"
"Referral"         = "https://github.com/hagezi/dns-blocklists/blob/main/controld/referral-allow-folder.json"
"Samsung Tracker"         = "https://github.com/hagezi/dns-blocklists/blob/main/controld/native-tracker-samsung-folder.json"
"Spam IDNs"         = "https://github.com/hagezi/dns-blocklists/blob/main/controld/spam-idns-folder.json"
"Spam TLDs allow"         = "https://github.com/hagezi/dns-blocklists/blob/main/controld/spam-tlds-allow-folder.json"
"Spam TLDs"         = "https://github.com/hagezi/dns-blocklists/blob/main/controld/spam-tlds-folder.json"

# =============================================================================
# PROFILE → FOLDER MAPPINGS
# =============================================================================
# For each profile, list which folders (by friendly name) it should receive.
# Use the exact names from the [folders] section above.
# =============================================================================

[profile_folders]
Aggressive    = ["Badware Hoster", "Known Issues allow", "Referral", "Spam IDNs", "Spam TLDs allow", "Spam TLDs", "Samsung Tracker", "Apple Tracker"]
Extreme = ["Badware Hoster", "Known Issues allow", "Referral", "Spam IDNs", "Spam TLDs allow", "Spam TLDs", "Apple Tracker"]
Extreme for Windows  = ["Badware Hoster", "Known Issues allow", "Referral", "Spam IDNs", "Spam TLDs allow", "Spam TLDs", "Microsoft Tracker", "Apple Tracker"]
Hardened  = ["Badware Hoster", "Known Issues allow", "Referral", "Spam IDNs", "Spam TLDs allow", "Spam TLDs", "LG webOS Tracker", "Apple Tracker"]
